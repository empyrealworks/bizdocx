name: bizdocx
description: BizDocx - AI-powered business document hub.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '^3.9.2'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0

  # ── State Management ────────────────────────────────────
  flutter_riverpod: ^3.3.1

  # ── AI Generation ───────────────────────────────────────
  google_generative_ai: ^0.4.6

  # ── Document Pipeline ───────────────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0
  webview_flutter: ^4.8.0

  # ── Data Models ─────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # ── File System ─────────────────────────────────────────
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^11.0.2
  image_picker: ^1.1.2

  # ── Utilities ───────────────────────────────────────────
  uuid: ^4.5.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  go_router: ^17.2.2
  envied: ^1.3.4
  google_sign_in: ^7.2.0
  firebase_app_check: ^0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  envied_generator: ^1.1.1

flutter:
  uses-material-design: true
